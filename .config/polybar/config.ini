[global/wm]
include-file = ~/.config/polybar/decorations.ini
include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/colours_eleven.ini


[bar/bar]
monitor = DVI-D-0
override-redirect = true
wm-restack = i3
bottom = true
font-0 = "Iosevka Nerd Font Mono:size=26:weight=medium;7"
font-1 = "Iosevka Nerd Font Mono:size=10:weight=medium;3"
font-2 = "Iosevka Nerd Font Mono:size=15:weight=medium;4"
font-3 = "Iosevka Nerd Font Mono:size=18:weight=medium;5"

offset-x = 14
offset-y = 14
width = 1892
fixed-center = true
background = ${colours.dark1}
foreground = ${colours.light1}
radius = 4
border-size = 0
border-color = ${colours.dark1}
line-size = 3
line-color = ${colours.blue}
pseudo-transparency = true
modules-left = i3_circles
modules-center = musicIcon spotify
modules-right =fgap memory fgap  cpu fgap date
height = 35


[bar/bar2]
monitor = DisplayPort-0
override-redirect = true
wm-restack = i3
bottom = true
font-0 = "Iosevka Nerd Font Mono:size=26:weight=medium;7"
font-1 = "Iosevka Nerd Font Mono:size=10:weight=medium;3"
font-2 = "Iosevka Nerd Font Mono:size=15:weight=medium;4"
font-3 = "Iosevka Nerd Font Mono:size=18:weight=medium;5"

offset-x = 14
offset-y = 14
width = 1572
fixed-center = true
background = ${colours.dark1}
foreground = ${colours.light1}
radius = 4
border-size = 0
border-color = ${colours.dark1}
line-size = 3
line-color = ${colours.blue}
pseudo-transparency = true
modules-left = i3_circles
modules-center = musicIcon spotify
modules-right =fgap memory fgap  cpu fgap date
height = 35




